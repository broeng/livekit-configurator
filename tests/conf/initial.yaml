sip:
  trunks:
    inbound:
      - name: default-sip-bridge-inbound
        allowed_addresses:
          - 0.0.0.0/0
        numbers:
          - 4512345678
    outbound:
      - name: default-sip-bridge-outbound
        address: 0.0.0.0
        numbers:
          - 4512345678

  dispatchRules:
    - name: "default-dispatch-rule"
      rule:
        dispatchRuleDirect:
          roomName: "test-room"
      trunk_ids: []
      hide_phone_number: False
    - name: "dispatch-rule-callee"
      rule:
        dispatchRuleCallee:
          roomPrefix: "test-room"
      numbers:
        - 4587654321
      trunk_ids: []
      hide_phone_number: False
    - name: "dispatch-rule-ind"
      rule:
        dispatchRuleIndividual:
          roomPrefix: "test-room"
      numbers:
        - 4587654333
      trunk_ids: []
      hide_phone_number: False
